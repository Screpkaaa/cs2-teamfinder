<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>CS2 TeamFinder — с никами и админкой</title>
    <meta name="description" content="CS2 TeamFinder – сервис для поиска тиммейтов в CS2. Создавай объявления, ставь лайки, общайся в чате, смотри матчи и находи команду.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
            }
        }
    </script>
    <style>
        /* ========== ТЕ ЖЕ СТИЛИ (полный CSS из предыдущей версии) ========== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            background: #0a0c15;
            color: #ffffff;
            min-height: 100vh;
            transition: background 0.3s, color 0.2s;
        }
        body.light {
            background: #f0f2f5;
            color: #1a1a2e;
        }
        .skin-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: -2;
            pointer-events: none;
        }
        .skin {
            position: absolute;
            font-size: 3rem;
            opacity: 0.1;
            animation: floatSkin 25s linear infinite;
            filter: drop-shadow(0 0 5px rgba(255,107,53,0.3));
        }
        body.light .skin { opacity: 0.06; }
        @keyframes floatSkin {
            0% { transform: translateX(-10%) translateY(0) rotate(0deg); }
            100% { transform: translateX(110%) translateY(0) rotate(360deg); }
        }
        .skin1 { top: 5%; left: -5%; animation-duration: 28s; }
        .skin2 { top: 20%; left: -5%; animation-duration: 35s; animation-delay: 3s; font-size: 3.5rem; }
        .skin3 { top: 35%; left: -5%; animation-duration: 30s; animation-delay: 7s; }
        .skin4 { top: 50%; left: -5%; animation-duration: 42s; animation-delay: 2s; font-size: 4rem; }
        .skin5 { top: 65%; left: -5%; animation-duration: 32s; animation-delay: 11s; }
        .skin6 { top: 80%; left: -5%; animation-duration: 38s; animation-delay: 5s; font-size: 3.5rem; }
        .skin7 { top: 92%; left: -5%; animation-duration: 27s; animation-delay: 14s; }
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at 30% 40%, rgba(255,107,53,0.08), transparent 70%);
            z-index: -1;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1.5rem;
            position: relative;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(255,107,53,0.3);
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }
        .logo-icon {
            font-size: 2.5rem;
            filter: drop-shadow(0 0 10px rgba(255,107,53,0.5));
            animation: pulse 2s ease infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        .logo-text {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ff6b35, #ffb347);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .logo-text span {
            color: #ffffff;
            background: none;
        }
        body.light .logo-text span {
            color: #1a1a2e;
        }
        .stats-panel {
            display: flex;
            gap: 0.8rem;
            align-items: center;
            flex-wrap: wrap;
        }
        .stat-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            border: 1px solid rgba(255,107,53,0.3);
            font-size: 0.85rem;
        }
        body.light .stat-card {
            background: rgba(0,0,0,0.05);
        }
        .header-btn {
            background: linear-gradient(135deg, #ff6b35, #f43f5e);
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            cursor: pointer;
            color: white;
            font-weight: bold;
            transition: all 0.3s;
        }
        .header-btn.outline {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,107,53,0.3);
        }
        .header-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(255,107,53,0.5);
        }
        .theme-toggle {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,107,53,0.3);
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            cursor: pointer;
            color: white;
            font-weight: bold;
            transition: all 0.3s;
        }
        body.light .theme-toggle {
            background: rgba(0,0,0,0.05);
            color: #1a1a2e;
        }
        .theme-toggle:hover {
            background: rgba(255,107,53,0.2);
            border-color: #ff6b35;
        }
        .tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid rgba(255,107,53,0.3);
            padding-bottom: 0.5rem;
        }
        .tab-btn {
            background: none;
            border: none;
            padding: 0.6rem 1.5rem;
            border-radius: 2rem;
            cursor: pointer;
            color: #94a3b8;
            font-weight: 500;
            transition: all 0.3s;
        }
        .tab-btn:hover { color: #ff6b35; }
        .tab-btn.active {
            background: linear-gradient(135deg, #ff6b35, #f43f5e);
            color: white;
        }
        .tab-content {
            display: none;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .tab-content.active { display: block; }
        .two-columns {
            display: grid;
            grid-template-columns: 380px 1fr;
            gap: 1.8rem;
        }
        .form-card {
            background: rgba(20, 25, 45, 0.7);
            backdrop-filter: blur(16px);
            border-radius: 1.8rem;
            padding: 1.5rem;
            border: 1px solid rgba(255,107,53,0.3);
            position: sticky;
            top: 1rem;
            transition: all 0.3s;
        }
        body.light .form-card {
            background: rgba(255,255,255,0.7);
        }
        .form-card:hover {
            border-color: rgba(255,107,53,0.6);
            box-shadow: 0 0 20px rgba(255,107,53,0.1);
        }
        .form-title {
            font-size: 1.3rem;
            margin-bottom: 1.2rem;
            font-weight: 600;
        }
        input, textarea, select {
            width: 100%;
            padding: 0.8rem 1rem;
            margin-bottom: 0.8rem;
            background: rgba(10, 15, 30, 0.8);
            border: 1px solid #2a2f4a;
            border-radius: 1rem;
            color: white;
            font-size: 0.9rem;
            transition: all 0.3s;
        }
        body.light input, body.light textarea, body.light select {
            background: white;
            border: 1px solid #ccc;
            color: #1a1a2e;
        }
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #ff6b35;
            box-shadow: 0 0 0 3px rgba(255,107,53,0.2);
        }
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.8rem;
        }
        .checkbox-group input { width: auto; margin: 0; }
        .btn-primary {
            background: linear-gradient(135deg, #ff6b35, #f43f5e);
            width: 100%;
            padding: 0.9rem;
            border: none;
            border-radius: 2rem;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            filter: brightness(1.05);
            box-shadow: 0 10px 20px rgba(255,107,53,0.3);
        }
        .search-bar {
            display: flex;
            gap: 0.8rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }
        .search-bar input, .search-bar select { margin-bottom: 0; flex: 1; }
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 1.2rem;
        }
        .player-card {
            background: rgba(20, 25, 45, 0.6);
            backdrop-filter: blur(12px);
            border-radius: 1.5rem;
            padding: 1.2rem;
            border: 1px solid rgba(255,107,53,0.2);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        body.light .player-card {
            background: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .player-card:hover {
            transform: translateY(-5px);
            border-color: rgba(255,107,53,0.5);
            box-shadow: 0 20px 30px -15px rgba(0,0,0,0.5);
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.8rem;
            flex-wrap: wrap;
        }
        .player-name {
            font-size: 1.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #ffb347, #ff6b35);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .likes {
            display: flex;
            align-items: center;
            gap: 0.3rem;
            background: rgba(0,0,0,0.3);
            padding: 0.2rem 0.6rem;
            border-radius: 2rem;
        }
        body.light .likes { background: rgba(0,0,0,0.05); }
        .like-btn {
            background: none;
            border: none;
            font-size: 1.1rem;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .like-btn:hover { transform: scale(1.1); }
        .liked { color: #ff4444; }
        .stars {
            display: flex;
            gap: 0.2rem;
            margin: 0.6rem 0;
        }
        .star {
            font-size: 0.9rem;
            cursor: pointer;
            color: #4a4a6a;
            transition: all 0.2s;
        }
        .star:hover { transform: scale(1.1); }
        .star.active { color: #ffd700; text-shadow: 0 0 5px #ffd700; }
        body.light .star { color: #ccc; }
        .badge {
            display: inline-block;
            padding: 0.2rem 0.7rem;
            border-radius: 2rem;
            font-size: 0.7rem;
            font-weight: 600;
            margin-right: 0.4rem;
            margin-bottom: 0.4rem;
        }
        .rank-badge { background: linear-gradient(135deg, #2d3748, #1a202c); color: #fbbf24; border: 1px solid #fbbf2433; }
        .role-badge { background: linear-gradient(135deg, #1e3a5f, #0f2a4a); color: #7dd3fc; border: 1px solid #7dd3fc33; }
        .mic-badge { background: linear-gradient(135deg, #10b981, #059669); color: white; }
        .region-badge { background: linear-gradient(135deg, #8b5cf6, #6d28d9); color: white; }
        .time-badge { background: linear-gradient(135deg, #f59e0b, #d97706); color: #1a1a2e; }
        .faceit-level { background: linear-gradient(135deg, #ffd700, #ffb347); color: #1a1a2e; }
        .desc-text {
            margin: 0.8rem 0;
            font-size: 0.85rem;
            line-height: 1.4;
            color: #b0b8d0;
            background: rgba(0,0,0,0.2);
            padding: 0.6rem;
            border-radius: 1rem;
        }
        body.light .desc-text {
            color: #4a5568;
            background: #f7fafc;
        }
        .social-links {
            display: flex;
            gap: 0.5rem;
            margin: 0.8rem 0;
            flex-wrap: wrap;
        }
        .social-link {
            padding: 0.2rem 0.7rem;
            border-radius: 1.5rem;
            font-size: 0.65rem;
            text-decoration: none;
            transition: all 0.2s;
        }
        .social-link:hover { transform: translateY(-2px); }
        .discord-link { background: #5865f2; color: white; }
        .twitch-link { background: #9146ff; color: white; }
        .telegram-link { background: #0088cc; color: white; }
        .steam-code {
            font-family: monospace;
            background: rgba(0,0,0,0.4);
            padding: 0.3rem 0.7rem;
            border-radius: 1rem;
            font-size: 0.7rem;
            display: inline-block;
        }
        body.light .steam-code { background: #e2e8f0; }
        .qr-code {
            text-align: center;
            margin: 0.6rem 0;
            cursor: pointer;
            font-size: 0.7rem;
            color: #66c0f4;
            transition: all 0.2s;
        }
        .qr-code:hover { color: #ff6b35; }
        .action-buttons {
            display: flex;
            gap: 0.6rem;
            margin-top: 0.8rem;
            flex-wrap: wrap;
        }
        .btn-steam, .btn-delete, .chat-btn {
            padding: 0.5rem;
            border-radius: 2rem;
            font-size: 0.7rem;
            cursor: pointer;
            flex: 1;
            text-align: center;
            transition: all 0.2s;
        }
        .btn-steam { background: #171a21; border: 1px solid #66c0f4; color: white; }
        .btn-steam:hover { background: #2a475e; transform: scale(1.02); }
        .btn-delete { background: #dc2626; border: none; color: white; }
        .btn-delete:hover { background: #ef4444; }
        .chat-btn { background: #3b82f6; border: none; color: white; }
        .chat-btn:hover { background: #2563eb; }
        .empty-state {
            text-align: center;
            padding: 3rem;
            background: rgba(0,0,0,0.2);
            border-radius: 1.5rem;
            color: #6b7280;
        }
        .date-small {
            font-size: 0.6rem;
            color: #6b7280;
            text-align: right;
            margin-top: 0.6rem;
        }
        .matches-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.2rem;
            margin-top: 1rem;
        }
        .match-card {
            background: rgba(20, 25, 45, 0.6);
            backdrop-filter: blur(12px);
            border-radius: 1.5rem;
            padding: 1.2rem;
            border: 1px solid rgba(255,107,53,0.2);
            transition: all 0.3s;
        }
        body.light .match-card {
            background: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .match-card:hover {
            transform: translateY(-5px);
            border-color: rgba(255,107,53,0.5);
        }
        .match-title {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }
        .match-link {
            display: inline-block;
            margin-top: 0.6rem;
            padding: 0.4rem 0.8rem;
            background: rgba(255,107,53,0.2);
            border-radius: 2rem;
            color: #ff6b35;
            text-decoration: none;
            font-size: 0.7rem;
            transition: all 0.3s;
        }
        .match-link:hover {
            background: #ff6b35;
            color: white;
        }
        .admin-panel {
            background: rgba(255,107,53,0.1);
            border-radius: 1rem;
            padding: 1rem;
            margin-bottom: 1.5rem;
            border: 1px solid rgba(255,107,53,0.3);
        }
        .add-match-form {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
        }
        .add-match-form input { flex: 2; margin: 0; }
        .add-match-form button { flex: 1; margin: 0; }
        .chat-modal {
            display: none;
            position: fixed;
            bottom: 1rem;
            right: 1rem;
            width: 320px;
            background: #1a1f35;
            backdrop-filter: blur(16px);
            border-radius: 1rem;
            border: 1px solid rgba(255,107,53,0.3);
            z-index: 1000;
            flex-direction: column;
        }
        body.light .chat-modal { background: white; }
        .chat-header {
            background: linear-gradient(135deg, #ff6b35, #f43f5e);
            padding: 0.7rem;
            border-radius: 1rem 1rem 0 0;
            display: flex;
            justify-content: space-between;
            cursor: pointer;
            color: white;
        }
        .chat-messages {
            height: 250px;
            overflow-y: auto;
            padding: 0.7rem;
            font-size: 0.8rem;
        }
        .chat-input-area {
            display: flex;
            padding: 0.7rem;
            gap: 0.5rem;
            border-top: 1px solid #334155;
        }
        .chat-input-area input { margin: 0; }
        body.light .chat-input-area { border-top: 1px solid #ccc; }
        .templates {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }
        .template-btn {
            background: #334155;
            border: none;
            padding: 0.3rem 0.8rem;
            border-radius: 2rem;
            font-size: 0.7rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        body.light .template-btn {
            background: #e2e8f0;
            color: #1a1a2e;
        }
        .template-btn:hover {
            background: #ff6b35;
            color: white;
        }
        .donate-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
        .donate-modal-content {
            background: rgba(20, 25, 45, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 1.5rem;
            padding: 1.8rem;
            max-width: 380px;
            width: 90%;
            text-align: center;
            border: 1px solid rgba(255,107,53,0.4);
            animation: modalPop 0.3s ease;
            box-shadow: 0 0 30px rgba(255,107,53,0.2);
        }
        body.light .donate-modal-content {
            background: rgba(255,255,255,0.95);
            border: 1px solid rgba(255,107,53,0.3);
        }
        @keyframes modalPop {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        .donate-modal-content h3 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #ffb347, #ff6b35);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .donate-amounts {
            display: flex;
            gap: 0.7rem;
            justify-content: center;
            margin-bottom: 1.2rem;
            flex-wrap: wrap;
        }
        .donate-amount {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,107,53,0.3);
            padding: 0.6rem 1.2rem;
            border-radius: 2rem;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }
        body.light .donate-amount { background: rgba(0,0,0,0.05); }
        .donate-amount:hover {
            background: linear-gradient(135deg, #ff6b35, #f43f5e);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255,107,53,0.4);
            color: white;
        }
        .donate-custom {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.2rem;
        }
        .donate-custom input {
            flex: 1;
            margin: 0;
            background: rgba(10,15,30,0.8);
            border: 1px solid #2a2f4a;
            border-radius: 2rem;
            padding: 0.7rem 1rem;
            color: white;
        }
        body.light .donate-custom input {
            background: white;
            border: 1px solid #ccc;
            color: #1a1a2e;
        }
        .donate-custom button {
            background: linear-gradient(135deg, #ff6b35, #f43f5e);
            border: none;
            padding: 0.7rem 1.2rem;
            border-radius: 2rem;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        .donate-custom button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255,107,53,0.4);
        }
        .donate-button {
            background: linear-gradient(135deg, #ff6b35, #f43f5e);
            width: 100%;
            padding: 0.9rem;
            border: none;
            border-radius: 2rem;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 1rem;
            box-shadow: 0 2px 8px rgba(255,107,53,0.3);
        }
        .donate-button:hover {
            transform: translateY(-2px);
            filter: brightness(1.05);
            box-shadow: 0 8px 20px rgba(255,107,53,0.4);
        }
        .close-modal {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            padding: 0.5rem 1.2rem;
            border-radius: 2rem;
            cursor: pointer;
            transition: all 0.3s;
            color: inherit;
        }
        body.light .close-modal {
            background: rgba(0,0,0,0.05);
            border-color: #ccc;
        }
        .close-modal:hover {
            background: rgba(255,107,53,0.2);
            border-color: #ff6b35;
        }
        @media (max-width: 800px) {
            .container { padding: 1rem; }
            .two-columns { grid-template-columns: 1fr; }
            .form-card { position: static; }
        }
    </style>
</head>

<div class="skin-bg">
    <div class="skin skin1">❤️</div>
    <div class="skin skin2">❤️</div>
    <div class="skin skin3">❤️</div>
    <div class="skin skin4">❤️</div>
    <div class="skin skin5">❤️</div>
    <div class="skin skin6">❤️</div>
    <div class="skin skin7">❤️</div>
</div>

                </div>
                <div class="add-match-form">
                    <input type="text" id="matchTitle" placeholder="Название матча">

<script type="module">
    import { initializeApp } from "firebase/app";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "firebase/auth";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, doc, updateDoc, arrayUnion, getDoc, setDoc, deleteDoc, serverTimestamp } from "firebase/firestore";

    const firebaseConfig = {
        apiKey: "AIzaSyB0NNx_xuSTWwvtC7ArR7cpLjagV3E8kxc",
        authDomain: "cs2-teamfinder.firebaseapp.com",
        projectId: "cs2-teamfinder",
        storageBucket: "cs2-teamfinder.firebasestorage.app",
        messagingSenderId: "339871719223",
        appId: "1:339871719223:web:74a5b9b2974aa021b5c4b2"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentUser = null;
    let currentUserNick = null;
    let isAdmin = false;
    let postsUnsubscribe = null; 
    let chatUnsubscribe = null;
    let matchesUnsubscribe = null;

    // Константы
    const DONATION_ALERTS_URL = 'https://www.donationalerts.com/r/screpochkaa'; // замени
    const TELEGRAM_ADMIN_LINK = 'https://t.me/TeamFinderCS2'; // замени

    // DOM элементы
    const authContainer = document.getElementById('authContainer');
    const mainContent = document.getElementById('mainContent');
    const userInfo = document.getElementById('userInfo');
    const adminPanel = document.getElementById('adminPanel');
    const cardsContainer = document.getElementById('cardsContainer');
    const matchesContainer = document.getElementById('matchesContainer');
    const chatMessagesDiv = document.getElementById('chatMessages');
    const onlineCounter = document.getElementById('onlineCounter');
    const topRolesSpan = document.getElementById('topRoles');

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
    }

    function updateStats(posts) {
        onlineCounter.innerText = posts.length;
        const roles = {};
        posts.forEach(p => { roles[p.role] = (roles[p.role] || 0) + 1; });
        const top = Object.entries(roles).sort((a, b) => b[1] - a[1]).slice(0, 2);
        topRolesSpan.innerText = top.map(r => `${r[0]}(${r[1]})`).join(' ') || 'нет';
    }

    function getStarsHtml(postId, avgRating) {
        let html = '<div class="stars">';
        for (let i = 1; i <= 5; i++) {
            html += `<span class="star ${avgRating >= i ? 'active' : ''}" data-post-id="${postId}" data-rating="${i}">★</span>`;
        }
        html += `<span class="rating-text">(${avgRating.toFixed(1)})</span></div>`;
        return html;
    }

    // Функция для получения ника пользователя по uid (с кэшированием)
    const nickCache = new Map();
    async function getUserNick(uid) {
        if (nickCache.has(uid)) return nickCache.get(uid);
        try {
            const userDoc = await getDoc(doc(db, 'users', uid));
            if (userDoc.exists()) {
                const nick = userDoc.data().nick || userDoc.data().email || 'Аноним';
                nickCache.set(uid, nick);
                return nick;
            }
        } catch(e) { console.warn(e); }
        return 'Аноним';
    }

    async function loadPostsRealtime() {
        if (postsUnsubscribe) postsUnsubscribe();
        const q = query(collection(db, 'posts'), orderBy('createdAt', 'desc'));
        postsUnsubscribe = onSnapshot(q, async (snapshot) => {
            const posts = [];
            for (const docSnap of snapshot.docs) {
                const data = docSnap.data();
                // Добавляем ник автора (асинхронно, но для простоты рендерим без, потом обновим)
                posts.push({ id: docSnap.id, ...data });
            }
            await renderPosts(posts);
            updateStats(posts);
        });
    }

    async function renderPosts(posts) {
        if (!posts.length) {
            cardsContainer.innerHTML = '<div class="empty-state">😢 Нет объявлений</div>';
            return;
        }
        // Для каждого поста получим ник автора
        const postsWithNick = await Promise.all(posts.map(async (p) => {
            const nick = await getUserNick(p.authorId);
            return { ...p, authorNick: nick };
        }));
        let html = '';
        for (let p of postsWithNick) {
            const hasLiked = p.likedBy && p.likedBy.includes(currentUser?.uid);
            const avg = p.avgRating || 0;
            html += `<div class="player-card">
                        <div class="card-header">
                            <div class="player-name">🎮 ${escapeHtml(p.nick)}${p.verified ? ' ✅' : ''}</div>
                            <div class="likes">
                                <button class="like-btn" data-id="${p.id}" data-likes="${p.likes || 0}" data-likedby='${JSON.stringify(p.likedBy || [])}'>❤️</button>
                                <span>${p.likes || 0}</span>
                            </div>
                        </div>
                        <div style="font-size:0.7rem; color:#aaa;">Автор: ${escapeHtml(p.authorNick)}</div>
                        ${getStarsHtml(p.id, avg)}
                        <div>
                            <span class="badge rank-badge">🏆 ${escapeHtml(p.rank)}</span>
                            <span class="badge role-badge">⚔️ ${escapeHtml(p.role)}</span>
                            ${p.hasMic ? '<span class="badge mic-badge">🎙️ Микрофон</span>' : ''}
                            ${p.region ? `<span class="badge region-badge">🌍 ${escapeHtml(p.region)}</span>` : ''}
                            ${p.playTime ? `<span class="badge time-badge">🕐 ${escapeHtml(p.playTime)}</span>` : ''}
                            ${p.faceit && p.faceit > 0 ? `<span class="badge faceit-level">🎯 FACEIT lvl ${p.faceit}</span>` : ''}
                        </div>
                        <div class="desc-text">📌 ${escapeHtml(p.desc)}</div>
                        <div class="social-links">
                            ${p.discord ? `<a href="https://discord.gg/${p.discord}" target="_blank" class="social-link discord-link">Discord</a>` : ''}
                            ${p.twitch ? `<a href="https://twitch.tv/${p.twitch}" target="_blank" class="social-link twitch-link">Twitch</a>` : ''}
                            ${p.telegram ? `<a href="https://t.me/${p.telegram}" target="_blank" class="social-link telegram-link">Telegram</a>` : ''}
                        </div>
                        <div class="steam-code">Steam: ${escapeHtml(p.steam)}</div>
                        <div class="qr-code" data-steam="${p.steam}">📱 QR-код</div>
                        <div class="action-buttons">
                            <button class="btn-steam" data-steam="${p.steam}">➕ Добавить в Steam</button>
                            <button class="chat-btn" data-nick="${p.authorNick}">💬 Написать</button>
                            ${isAdmin ? `<button class="btn-delete delete-post" data-id="${p.id}">🗑 Удалить (админ)</button>` : ''}
                        </div>
                        <div class="date-small">📅 ${p.createdAt?.toDate ? p.createdAt.toDate().toLocaleString() : new Date(p.createdAt?.seconds * 1000).toLocaleString()}</div>
                    </div>`;
        }
        cardsContainer.innerHTML = html;
        attachPostEventListeners();
    }

    function attachPostEventListeners() {
        document.querySelectorAll('.like-btn').forEach(btn => {
            btn.removeEventListener('click', likeHandler);
            btn.addEventListener('click', likeHandler);
        });
        document.querySelectorAll('.star').forEach(star => {
            star.removeEventListener('click', starHandler);
            star.addEventListener('click', starHandler);
        });
        document.querySelectorAll('.qr-code').forEach(qr => {
            qr.removeEventListener('click', qrHandler);
            qr.addEventListener('click', qrHandler);
        });
        document.querySelectorAll('.btn-steam').forEach(btn => {
            btn.removeEventListener('click', steamHandler);
            btn.addEventListener('click', steamHandler);
        });
        document.querySelectorAll('.chat-btn').forEach(btn => {
            btn.removeEventListener('click', chatHandler);
            btn.addEventListener('click', chatHandler);
        });
        if (isAdmin) {
            document.querySelectorAll('.delete-post').forEach(btn => {
                btn.removeEventListener('click', deletePostHandler);
                btn.addEventListener('click', deletePostHandler);
            });
        }
    }

    async function likeHandler(e) {
        const btn = e.currentTarget;
        const postId = btn.dataset.id;
        const currentLikes = parseInt(btn.dataset.likes);
        const likedBy = JSON.parse(btn.dataset.likedby || '[]');
        if (!currentUser) return alert('Войдите');
        if (likedBy.includes(currentUser.uid)) return alert('Вы уже лайкнули');
        const postRef = doc(db, 'posts', postId);
        await updateDoc(postRef, { likes: currentLikes + 1, likedBy: arrayUnion(currentUser.uid) });
    }

    async function starHandler(e) {
        const star = e.currentTarget;
        const postId = star.dataset.postId;
        const rating = parseInt(star.dataset.rating);
        if (!currentUser) return alert('Войдите');
        const postRef = doc(db, 'posts', postId);
        const postSnap = await getDoc(postRef);
        const postData = postSnap.data();
        if (postData.ratedBy && postData.ratedBy.includes(currentUser.uid)) return alert('Вы уже оценили');
        const newCount = (postData.ratingCount || 0) + 1;
        const newSum = (postData.ratingSum || 0) + rating;
        const newAvg = newSum / newCount;
        await updateDoc(postRef, { ratingCount: newCount, ratingSum: newSum, avgRating: newAvg, ratedBy: arrayUnion(currentUser.uid) });
    }

    function qrHandler(e) {
        const steam = e.currentTarget.dataset.steam;
        alert(`🎮 Код: ${steam}\nsteam://friends/add/${steam}`);
    }
    function steamHandler(e) {
        const steam = e.currentTarget.dataset.steam;
        window.open(`steam://friends/add/${steam}`, '_blank');
        alert('Код: ' + steam);
    }
    function chatHandler(e) {
        const nick = e.currentTarget.dataset.nick;
        openChatWithUser(nick);
    }
    async function deletePostHandler(e) {
        const postId = e.currentTarget.dataset.id;
        if (!isAdmin) return alert('Нет прав');
        if (confirm('Удалить объявление?')) await deleteDoc(doc(db, 'posts', postId));
    }

    document.getElementById('createPostBtn')?.addEventListener('click', async () => {
        if (!currentUser) return alert('Вы не авторизованы');
        const nick = document.getElementById('nick').value.trim();
        const rank = document.getElementById('rank').value.trim();
        const role = document.getElementById('role').value.trim();
        const hasMic = document.getElementById('hasMic').checked;
        const region = document.getElementById('region').value;
        const playTime = document.getElementById('playTime').value;
        const faceit = document.getElementById('faceitLevel').value;
        const discord = document.getElementById('discord').value.trim();
        const twitch = document.getElementById('twitch').value.trim();
        const telegram = document.getElementById('telegram').value.trim();
        const desc = document.getElementById('desc').value.trim();
        const steam = document.getElementById('steam').value.trim();
        const verified = document.getElementById('verifiedSteam').checked;
        if (!nick || !rank || !role || !desc || !steam) return alert('Заполните обязательные поля');
        await addDoc(collection(db, 'posts'), {
            nick, rank, role, hasMic, region, playTime, faceit, discord, twitch, telegram, desc, steam, verified,
            authorId: currentUser.uid,
            likes: 0, likedBy: [], ratingCount: 0, ratingSum: 0, avgRating: 0, ratedBy: [],
            createdAt: serverTimestamp()
        });
        document.getElementById('nick').value = '';
        document.getElementById('rank').value = '';
        document.getElementById('role').value = '';
        document.getElementById('hasMic').checked = false;
        document.getElementById('region').value = '';
        document.getElementById('playTime').value = '';
        document.getElementById('faceitLevel').value = '0';
        document.getElementById('discord').value = '';
        document.getElementById('twitch').value = '';
        document.getElementById('telegram').value = '';
        document.getElementById('desc').value = '';
        document.getElementById('steam').value = '';
        document.getElementById('verifiedSteam').checked = false;
    });

    async function loadChatRealtime() {
        if (chatUnsubscribe) chatUnsubscribe();
        const q = query(collection(db, 'messages'), orderBy('createdAt', 'asc'));
        chatUnsubscribe = onSnapshot(q, async (snapshot) => {
            const messages = [];
            for (const docSnap of snapshot.docs) {
                const data = docSnap.data();
                const authorNick = await getUserNick(data.authorId);
                messages.push({ id: docSnap.id, ...data, authorNick });
            }
            renderChatMessages(messages);
        });
    }

    function renderChatMessages(messages) {
        let html = '';
        for (let msg of messages) {
            html += `<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:0.3rem;">
                        <span><b>${escapeHtml(msg.authorNick)}</b>: ${escapeHtml(msg.text)}</span>
                        ${isAdmin ? `<button class="delete-msg" data-id="${msg.id}" style="background:none; border:none; color:#ff6b6b; cursor:pointer;">🗑</button>` : ''}
                    </div>`;
        }
        chatMessagesDiv.innerHTML = html;
        chatMessagesDiv.scrollTop = chatMessagesDiv.scrollHeight;
        if (isAdmin) {
            document.querySelectorAll('.delete-msg').forEach(btn => {
                btn.removeEventListener('click', deleteMsgHandler);
                btn.addEventListener('click', deleteMsgHandler);
            });
        }
    }

    async function deleteMsgHandler(e) {
        const msgId = e.currentTarget.dataset.id;
        if (!isAdmin) return;
        if (confirm('Удалить сообщение?')) await deleteDoc(doc(db, 'messages', msgId));
    }

    document.getElementById('sendMessageBtn')?.addEventListener('click', async () => {
        if (!currentUser) return alert('Войдите');
        const input = document.getElementById('chatInput');
        const text = input.value.trim();
        if (!text) return;
        await addDoc(collection(db, 'messages'), { text, authorId: currentUser.uid, createdAt: serverTimestamp() });
        input.value = '';
    });

    function openChatWithUser(nick) {
        const modal = document.getElementById('chatModal');
        modal.style.display = 'flex';
        document.getElementById('chatInput').value = `@${nick} `;
        document.getElementById('chatInput').focus();
    }

    async function loadMatchesRealtime() {
        if (matchesUnsubscribe) matchesUnsubscribe();
        const q = query(collection(db, 'matches'), orderBy('createdAt', 'desc'));
        matchesUnsubscribe = onSnapshot(q, (snapshot) => {
            const matches = [];
            snapshot.forEach(doc => matches.push({ id: doc.id, ...doc.data() }));
            renderMatches(matches);
        });
    }

    function renderMatches(matches) {
        if (!matches.length) {
            matchesContainer.innerHTML = '<div class="empty-state">🎬 Нет матчей</div>';
            return;
        }
        let html = '';
        for (let m of matches) {
            let platform = '';
            if (m.link.includes('twitch.tv')) platform = '📺 Twitch';
            else if (m.link.includes('youtube.com')) platform = '🎥 YouTube';
            else if (m.link.includes('faceit.com')) platform = '🎮 FACEIT';
            html += `<div class="match-card">
                        <div class="match-title">🎬 ${escapeHtml(m.title)}</div>
                        <div style="font-size:0.65rem; color:#66c0f4;">${platform}</div>
                        <a href="${m.link}" target="_blank" class="match-link">▶ Смотреть</a>
                        ${isAdmin ? `<button class="delete-match" data-id="${m.id}" style="margin-left:0.5rem; background:#dc2626; border:none; padding:0.2rem 0.5rem; border-radius:1rem; color:white; cursor:pointer;">🗑 Удалить</button>` : ''}
                        <div class="date-small">📅 ${m.createdAt?.toDate ? m.createdAt.toDate().toLocaleString() : new Date(m.createdAt?.seconds * 1000).toLocaleString()}</div>
                    </div>`;
        }
        matchesContainer.innerHTML = html;
        if (isAdmin) {
            document.querySelectorAll('.delete-match').forEach(btn => {
                btn.removeEventListener('click', deleteMatchHandler);
                btn.addEventListener('click', deleteMatchHandler);
            });
        }
    }

    async function deleteMatchHandler(e) {
        const matchId = e.currentTarget.dataset.id;
        if (!isAdmin) return;
        if (confirm('Удалить матч?')) await deleteDoc(doc(db, 'matches', matchId));
    }

    document.getElementById('addMatchBtn')?.addEventListener('click', async () => {
        if (!isAdmin) return alert('Только админ');
        const title = document.getElementById('matchTitle').value.trim();
        const link = document.getElementById('matchLink').value.trim();
        if (!title || !link) return alert('Заполните поля');
        await addDoc(collection(db, 'matches'), { title, link, createdAt: serverTimestamp() });
        document.getElementById('matchTitle').value = '';
        document.getElementById('matchLink').value = '';
    });

    // Регистрация с ником
    document.getElementById('registerBtn')?.addEventListener('click', async () => {
        const nick = document.getElementById('regNick').value.trim();
        const email = document.getElementById('regEmail').value.trim();
        const password = document.getElementById('regPassword').value;
        if (!nick || !email || !password) return alert('Заполните все поля');
        try {
            const userCred = await createUserWithEmailAndPassword(auth, email, password);
            await setDoc(doc(db, 'users', userCred.user.uid), {
                email: email,
                nick: nick,
                isAdmin: false,
                createdAt: serverTimestamp()
            });
            alert('Регистрация успешна!');
        } catch (err) { alert(err.message); }
    });

    document.getElementById('loginBtn')?.addEventListener('click', async () => {
        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;
        if (!email || !password) return alert('Заполните поля');
        try {
            await signInWithEmailAndPassword(auth, email, password);
            alert('Вход выполнен');
        } catch (err) { alert(err.message); }
    });

    onAuthStateChanged(auth, async (user) => {
        currentUser = user;
        if (user) {
            const userDoc = await getDoc(doc(db, 'users', user.uid));
            const userData = userDoc.data();
            isAdmin = userData?.isAdmin === true;
            currentUserNick = userData?.nick || user.email;
            authContainer.style.display = 'none';
            mainContent.style.display = 'block';
            userInfo.innerHTML = `<span style="margin-right:0.8rem;">👋 ${escapeHtml(currentUserNick)}</span>
                                  <button class="header-btn outline" id="logoutBtn">Выйти</button>`;
            document.getElementById('logoutBtn')?.addEventListener('click', () => signOut(auth));
            adminPanel.style.display = isAdmin ? 'block' : 'none';
            loadPostsRealtime();
            loadChatRealtime();
            loadMatchesRealtime();
        } else {
            authContainer.style.display = 'flex';
            mainContent.style.display = 'none';
            if (postsUnsubscribe) postsUnsubscribe();
            if (chatUnsubscribe) chatUnsubscribe();
            if (matchesUnsubscribe) matchesUnsubscribe();
            isAdmin = false;
        }
    });

    // Донат
    window.openDonateModal = () => document.getElementById('donateModal').style.display = 'flex';
    window.closeDonateModal = () => document.getElementById('donateModal').style.display = 'none';
    window.donateWithAlert = (amount) => { window.open(`${DONATION_ALERTS_URL}?amount=${amount}`, '_blank'); window.closeDonateModal(); };
    document.querySelectorAll('.donate-amount').forEach(btn => btn.addEventListener('click', () => window.donateWithAlert(btn.dataset.amount)));
    document.getElementById('customDonateBtn')?.addEventListener('click', () => {
        const amount = document.getElementById('customAmount').value;
        if (amount && amount > 0) window.donateWithAlert(amount);
        else alert('Введите сумму');
    });
    document.getElementById('donateWithAlertBtn')?.addEventListener('click', () => { window.open(DONATION_ALERTS_URL, '_blank'); window.closeDonateModal(); });
    document.getElementById('closeDonateModalBtn')?.addEventListener('click', () => window.closeDonateModal());
    document.getElementById('donateBtn')?.addEventListener('click', () => window.openDonateModal());

    document.getElementById('writeToAdminBtn')?.addEventListener('click', () => window.open(TELEGRAM_ADMIN_LINK, '_blank'));

    const themeToggle = document.getElementById('themeToggle');
    themeToggle?.addEventListener('click', () => {
        document.body.classList.toggle('light');
        localStorage.setItem('theme', document.body.classList.contains('light') ? 'light' : 'dark');
    });
    if (localStorage.getItem('theme') === 'light') document.body.classList.add('light');

    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const tab = btn.dataset.tab;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            if (tab === 'posts') document.getElementById('postsTab').classList.add('active');
            else if (tab === 'matches') document.getElementById('matchesTab').classList.add('active');
            else if (tab === 'chat') {
                document.getElementById('chatModal').style.display = 'flex';
                document.querySelector('.tab-btn.active').classList.remove('active');
                document.querySelector('.tab-btn[data-tab="posts"]').classList.add('active');
                document.getElementById('postsTab').classList.add('active');
            }
        });
    });
    document.getElementById('closeChatBtn')?.addEventListener('click', () => document.getElementById('chatModal').style.display = 'none');
    window.openChatWithUser = openChatWithUser;

    document.querySelectorAll('.template-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const type = btn.dataset.template;
            const templates = { awp: { role: 'AWP', desc: 'Играю на AWP, есть микрофон.' }, support: { role: 'Support', desc: 'Поддержка, знаю смоки.' }, igl: { role: 'IGL', desc: 'Капитан, тактика.' }, entry: { role: 'Entry', desc: 'Захожу первым.' } };
            const t = templates[type];
            if (t) {
                document.getElementById('role').value = t.role;
                document.getElementById('desc').value = t.desc;
            }
        });
    });

    function filterPosts() {
        const search = document.getElementById('searchInput').value.toLowerCase();
        const rankFilter = document.getElementById('filterRank').value;
        const regionFilter = document.getElementById('filterRegion').value;
        const allCards = document.querySelectorAll('.player-card');
        allCards.forEach(card => {
            const nick = card.querySelector('.player-name')?.innerText.toLowerCase() || '';
            const rankBadge = card.querySelector('.rank-badge')?.innerText || '';
            const regionBadge = card.querySelector('.region-badge')?.innerText || '';
            let match = true;
            if (search && !nick.includes(search)) match = false;
            if (rankFilter && !rankBadge.includes(rankFilter)) match = false;
            if (regionFilter && !regionBadge.includes(regionFilter)) match = false;
            card.style.display = match ? 'block' : 'none';
        });
    }
    document.getElementById('searchInput')?.addEventListener('input', filterPosts);
    document.getElementById('filterRank')?.addEventListener('change', filterPosts);
    document.getElementById('filterRegion')?.addEventListener('change', filterPosts);
</script>
</body>
</html>
